name: Publish

on:
  workflow_call:
    inputs:
      tag:
        required: true
        type: string
    secrets:
      NPM_TOKEN:
        required: true
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag to publish (e.g. v1.0.0)"
        required: true
        type: string

jobs:
  publish-npm:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - uses: actions/setup-node@v4
        with:
          node-version: "22.x"
          registry-url: https://registry.npmjs.org

      - name: Download release tarball
        run: gh release download "${{ inputs.tag }}" --repo "${{ github.repository }}" --pattern "*.tgz" --dir .
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish to npm
        run: npm publish *.tgz --access public --provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
